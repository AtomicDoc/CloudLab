name: Deploy

on:
  workflow_run:
    workflows:
      - Build and Push to Docker Hub
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Pull latest image
        run: docker compose -f /path/to/docker-compose.yml pull app

      - name: Restart app container
        run: docker compose -f /path/to/docker-compose.yml up -d --no-deps app
