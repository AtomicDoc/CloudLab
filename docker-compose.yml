
services:
  app:
    build: .
    container_name: url_shortener_app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    expose:
      - "8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: url_redis
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: url_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped